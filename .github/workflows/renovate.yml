name: Renovate (self-hosted)

# Runs Renovate against THIS repo on a schedule, under your own token — no third-party
# (Mend) GitHub App, nothing leaves your control. Behaviour comes from ./renovate.json.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write # open branches for updates
  pull-requests: write # open/maintain update PRs

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: renovatebot/github-action@v46
        with:
          # Prefer a personal access token stored as the RENOVATE_TOKEN secret (org- or
          # repo-level). A PAT is what lets Renovate's PRs TRIGGER CI (so automerge-on-green
          # works) — the default GITHUB_TOKEN cannot trigger other workflows. Without a PAT
          # it falls back to GITHUB_TOKEN: PRs still open, but you merge them manually.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          LOG_LEVEL: info
