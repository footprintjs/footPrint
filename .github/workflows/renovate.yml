name: Renovate (self-hosted)

# Runs Renovate against THIS repo on a schedule, under your own token — no third-party
# (Mend) GitHub App, nothing leaves your control. Behaviour comes from ./renovate.json.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

# One Renovate run at a time per repo.
concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write # open branches for updates
  pull-requests: write # open/maintain update PRs

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA (NOT the mutable @v46 tag): a moved/compromised tag could
      # otherwise run malicious code with these write perms + the RENOVATE_TOKEN and exfiltrate
      # it. Renovate's own github-actions manager keeps this SHA current via reviewable PRs.
      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          # Prefer a FINE-GRAINED PAT (this repo only; contents:write + pull-requests:write;
          # short expiry) stored as the RENOVATE_TOKEN secret — a PAT is what lets Renovate's
          # PRs TRIGGER CI (so automerge-on-green works); the default GITHUB_TOKEN cannot.
          # Without a PAT it falls back to GITHUB_TOKEN: PRs still open, but you merge manually.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          LOG_LEVEL: info
