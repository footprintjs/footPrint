name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'src/**'
      - 'typedoc.json'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Install library deps and build TypeDoc API reference.
      # No committed root lockfile (library policy); `cache: npm` dropped (it requires one).
      # The docs-site app below keeps its own committed lock + npm ci.
      - run: npm install
      - run: npm run docs
        # Outputs to api-docs/ — will be nested under /footPrint/api/

      # 2. Install docs-site deps and build Starlight
      - name: Install docs-site dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
        working-directory: docs-site

      - name: Build Starlight site
        run: npm run build
        working-directory: docs-site
        # Outputs to docs-site/dist/ — will become the root of /footPrint/

      # 3. Merge: place TypeDoc output at docs-site/dist/api/
      - name: Merge TypeDoc into Starlight output
        run: |
          mkdir -p docs-site/dist/api
          cp -r api-docs/. docs-site/dist/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
